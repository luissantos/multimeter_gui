name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/multimeter_gui.app" \
            multimeter-gui-macos.zip
          zip multimeter-gui-macos.zip LICENSE
      - uses: actions/upload-artifact@v7
        with:
          name: multimeter-gui-macos
          path: multimeter-gui-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        run: |
          Copy-Item LICENSE build\windows\x64\runner\Release\LICENSE
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath multimeter-gui-windows.zip
      - uses: actions/upload-artifact@v7
        with:
          name: multimeter-gui-windows
          path: multimeter-gui-windows.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libbluetooth-dev libdbus-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: |
          cp LICENSE build/linux/x64/release/bundle/LICENSE
          tar -czf multimeter-gui-linux.tar.gz -C build/linux/x64/release bundle
      - uses: actions/upload-artifact@v7
        with:
          name: multimeter-gui-linux
          path: multimeter-gui-linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: multimeter-gui-macos
      - uses: actions/download-artifact@v7
        with:
          name: multimeter-gui-windows
      - uses: actions/download-artifact@v7
        with:
          name: multimeter-gui-linux
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });

            for (const [file, mime] of [
              ['multimeter-gui-macos.zip',    'application/zip'],
              ['multimeter-gui-windows.zip',  'application/zip'],
              ['multimeter-gui-linux.tar.gz', 'application/gzip'],
            ]) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: file,
                data: fs.readFileSync(file),
                headers: { 'content-type': mime },
              });
            }
